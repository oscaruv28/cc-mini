# Orquesta el sistema completo. Con Docker Desktop:  docker compose up --build
# Levanta PostgreSQL + backend (API) + frontend (SPA servida por nginx).
# Accesos:  frontend http://localhost:8080  ·  API http://localhost:3000/api

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cc_mini
      POSTGRES_USER: cc_mini
      POSTGRES_PASSWORD: cc_mini
    ports:
      # Host 5433 -> contenedor 5432, para no chocar con un Postgres local en 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Backup de datos de ejemplo: se restaura al inicializar el volumen por primera vez.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # El backend no arranca hasta que Postgres acepte conexiones.
      test: ["CMD-SHELL", "pg_isready -U cc_mini -d cc_mini"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cc_mini
      DB_USER: cc_mini
      DB_PASSWORD: cc_mini
      PORT: 3000
      NODE_ENV: production
      APP_TZ: America/Bogota
      JWT_SECRET: dev-secret-change-me
      # La BD se inicializa desde el backup (db/init). AUTO_MIGRATE queda como
      # red de seguridad (no-op si el backup ya cargó el esquema); SEED off
      # porque los datos vienen del backup. Para poblar sin backup: npm run seed.
      DB_AUTO_MIGRATE: "true"
      DB_SEED: "false"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Mismo origen: la SPA llama a /api y nginx hace proxy al backend.
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
